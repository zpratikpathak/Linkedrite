{% extends "base/modern_base.html" %}

{% block title %}Schedule Calendar - LinkedRite{% endblock %}

{% block extra_css %}
<style>
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
    .cal-cell { min-height: 100px; }
    .cal-event { font-size: 0.7rem; line-height: 1.1; }
</style>
{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8" x-data="calendarApp()">
    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-6">
        <div>
            <h1 class="text-2xl font-bold">Schedule Calendar</h1>
            <p class="text-gray-500 dark:text-gray-400 mt-1">View your scheduled and published posts</p>
        </div>
        <a href="{% url 'posts:create' %}" class="mt-4 sm:mt-0 inline-flex items-center px-5 py-2.5 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-lg hover:from-indigo-700 hover:to-purple-700 transition-all font-medium">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            New Post
        </a>
    </div>

    <!-- Calendar Navigation -->
    <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 overflow-hidden">
        <div class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-gray-700">
            <button @click="prevMonth()" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <h2 class="text-lg font-semibold" x-text="monthYearLabel"></h2>
            <button @click="nextMonth()" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </button>
        </div>

        <!-- Day Headers -->
        <div class="cal-grid border-b border-gray-200 dark:border-gray-700">
            <template x-for="day in ['Sun','Mon','Tue','Wed','Thu','Fri','Sat']">
                <div class="p-2 text-center text-xs font-medium text-gray-500 dark:text-gray-400 uppercase" x-text="day"></div>
            </template>
        </div>

        <!-- Calendar Grid -->
        <div class="cal-grid">
            <template x-for="cell in calendarCells" :key="cell.key">
                <div class="cal-cell border-b border-r border-gray-100 dark:border-gray-700 p-1.5"
                    :class="{ 'bg-gray-50 dark:bg-gray-850': !cell.currentMonth, 'bg-blue-50 dark:bg-blue-900/10': cell.isToday }">
                    <div class="text-xs font-medium mb-1"
                        :class="cell.currentMonth ? 'text-gray-700 dark:text-gray-300' : 'text-gray-400 dark:text-gray-600'"
                        x-text="cell.day"></div>
                    <template x-for="ev in cell.events" :key="ev.id">
                        <a :href="'/posts/' + ev.id + '/'" class="block cal-event mb-0.5 px-1.5 py-0.5 rounded truncate transition-colors"
                            :class="ev.status === 'published'
                                ? 'bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-400 hover:bg-green-200 dark:hover:bg-green-900/50'
                                : 'bg-amber-100 text-amber-800 dark:bg-amber-900/30 dark:text-amber-400 hover:bg-amber-200 dark:hover:bg-amber-900/50'"
                            x-text="ev.title">
                        </a>
                    </template>
                </div>
            </template>
        </div>
    </div>

    <!-- Legend -->
    <div class="flex items-center space-x-6 mt-4 text-sm text-gray-600 dark:text-gray-400">
        <div class="flex items-center">
            <span class="w-3 h-3 bg-green-200 dark:bg-green-900/50 rounded mr-2"></span> Published
        </div>
        <div class="flex items-center">
            <span class="w-3 h-3 bg-amber-200 dark:bg-amber-900/50 rounded mr-2"></span> Scheduled
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function calendarApp() {
    const events = {{ events_json|safe }};

    return {
        currentDate: new Date(),
        events: events,

        get monthYearLabel() {
            return this.currentDate.toLocaleString('default', { month: 'long', year: 'numeric' });
        },

        get calendarCells() {
            const year = this.currentDate.getFullYear();
            const month = this.currentDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrev = new Date(year, month, 0).getDate();
            const today = new Date();
            const cells = [];

            for (let i = firstDay - 1; i >= 0; i--) {
                const day = daysInPrev - i;
                cells.push({ key: `p${day}`, day, currentMonth: false, isToday: false, events: [] });
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === d;
                const dayEvents = this.events.filter(e => e.date && e.date.startsWith(dateStr));
                cells.push({ key: `c${d}`, day: d, currentMonth: true, isToday, events: dayEvents });
            }

            const remaining = 42 - cells.length;
            for (let i = 1; i <= remaining; i++) {
                cells.push({ key: `n${i}`, day: i, currentMonth: false, isToday: false, events: [] });
            }

            return cells;
        },

        prevMonth() {
            this.currentDate = new Date(this.currentDate.getFullYear(), this.currentDate.getMonth() - 1, 1);
        },
        nextMonth() {
            this.currentDate = new Date(this.currentDate.getFullYear(), this.currentDate.getMonth() + 1, 1);
        },
    };
}
</script>
{% endblock %}
